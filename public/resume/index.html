<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Samik Sengupta — Resume</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #040f17; color: #F6FCFF; font-family: 'JetBrains Mono', 'Courier New', monospace; }

    .topbar {
      position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px;
      background: rgba(4, 9, 18, 0.96);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      backdrop-filter: blur(20px);
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #00ffa3; box-shadow: 0 0 6px #00ffa3; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.4 } }
    .name { font-size: 13px; color: rgba(224,235,240,0.7); letter-spacing: 0.05em; }
    .tag { font-size: 10px; color: rgba(224,235,240,0.35); letter-spacing: 0.1em; }

    .topbar-right { display: flex; gap: 10px; }
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 8px 18px; border-radius: 999px;
      font-family: inherit; font-size: 11px; font-weight: 600; letter-spacing: 0.05em;
      cursor: pointer; text-decoration: none; transition: all 0.2s;
    }
    .btn-primary { background: #00ffa3; color: #040f17; border: none; box-shadow: 0 0 20px rgba(0,255,163,0.2); }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-ghost { background: transparent; color: rgba(224,235,240,0.6); border: 1px solid rgba(255,255,255,0.1); }
    .btn-ghost:hover { background: rgba(255,255,255,0.04); color: rgba(224,235,240,0.9); }

    .embed-wrap {
      width: 100%; height: calc(100vh - 57px);
    }
    embed, iframe { width: 100%; height: 100%; border: none; display: block; }

    .mobile-msg {
      display: none;
      flex-direction: column; align-items: center; justify-content: center;
      height: calc(100vh - 57px); gap: 20px; padding: 32px; text-align: center;
    }
    .mobile-msg h2 { font-size: 22px; color: #F6FCFF; font-family: Georgia, serif; }
    .mobile-msg p { font-size: 13px; color: rgba(224,235,240,0.5); line-height: 1.7; max-width: 320px; }

    @media (max-width: 640px) {
      .embed-wrap { display: none; }
      .mobile-msg { display: flex; }
      .topbar { padding: 10px 16px; }
      .name { font-size: 11px; }
      .btn { padding: 7px 14px; font-size: 10px; }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
</head>

  <div class="topbar">

      <div>

      </div>
    </div>
    <div class="topbar-right">
      <a href="/" class="btn btn-ghost">← Portfolio</a>

        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>

  <div class="embed-wrap">
    <embed src="/resume/Samik_Sengupta_Data_Engineer_Resume.pdf#toolbar=1&navpanes=0" type="application/pdf" />
  </div>

  <div class="mobile-msg">

      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
      <polyline points="10 9 9 9 8 9"/>
    </svg>
    <h2>Resume</h2>
    <p>PDF preview isn't available on mobile. Download the file to view it in your PDF reader.</p>
    <a href="/resume/Samik_Sengupta_Data_Engineer_Resume.pdf" download class="btn btn-primary" style="margin-top:8px">
      Download PDF
    </a>
    <a href="/" class="btn btn-ghost">← Back to portfolio</a>
  </div>

</body>
</html>
